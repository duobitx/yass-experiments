apiVersion: int.esa.yass/v1
kind: HardwareDefinition
metadata:
  name: sentinel-2
description: |
    Name: Sentinel-2 (MSI)
    Primary Data: Optical MSI, 13 bands @10/20/60 m; 5-day global @equator (A/B/C/D planned)	
    Data Generation (≈/day): up to 1.6 TB stored per orbit (max); constellation daily volume multi-TB
    On-board Storage: ≈2.4 Tbit (300 GB) NAND flash mass memory
    OBC / Memory: Atmel ERC-32 OBC; dual MIL-STD-1553B buses
    Downlink / Relay: X-band 560 Mbit/s; EDRS optical relay; S-band TT&C 64 kbps up / 2 Mbit/s down	
    Connectivity Window: Laser (EDRS) + X-band passes (~10 min)	
    Launch Year: 2015	
    CPU class: ERC32 (SPARC V7) OBC ~20 MHz; payload DHU separate
spec:
  # cpu / memory are translated into the engine container's Limits; K8s
  # defaults Requests=Limits when Requests is unset, so these are also
  # what the scheduler reserves. Values picked 2026-05-29 to fit UC1-5
  # sweeps on cf (measured engine RAM ~8 MB for TUS, ~100-200 MB for
  # EDFS; original 1500m/2Gi was 100-600× over the real envelope).
  cpu: "500m"
  memory: "512Mi"
  diskSpace: "150Gi"  # 50% of NAND
  batteryCapacityWh: 15000
  batteryChargeW: 1700
  lowPowerThresholdWh: 1500 # 10% of battery capacity
  energyConsumption:
    normalPowerBaseW: 1500
    lowPowerBaseW: 900
    perkByteTXWh: 0.00001
    perkByteDiskWR: 0.00002
    perkByteDiskRD: 0.00001

#  networkInterfaces:
#    - name: xband0
#      type: xband
#      description: "X-band downlink: ~ 560 Mbit/s downlink (averaged over the transfer window)"
#      tx: 70000000  # bit/s
#      rx: 0  # bit/s
#      minLatency: 0.015  # s
#    - name: sband0
#      type: sband
#      description: "S-band TT&C: ~ 2 Mbit/s downlink, ~ 64 kbit/s uplink"
#      tx: 2000000  # bit/s
#      rx: 64000  # bit/s
#      minLatency: 0.025  # s
#    - name: edrs0
#      type: edrs
#      description: "EDRS optical relay: up to 1.8 Gbit/s (averaged over transfer window)"
#      tx: 1800000000  # bit/s
#      rx: 0  # bit/s
#      minLatency: 0.026  # s
---
apiVersion: int.esa.yass/v1
kind: HardwareDefinition
metadata:
  name: nano-sat
description: |
    Generic CubeSat / nanosatellite profile used for large-scale constellation
    tests (e.g. big-scale, 200 satellites). Much smaller resource footprint
    than sentinel-2 so a full constellation fits on a single cluster.
spec:
  cpu: "200m"
  memory: "256Mi"
  diskSpace: "8Gi"
  batteryCapacityWh: 50
  batteryChargeW: 30
  lowPowerThresholdWh: 5
  energyConsumption:
    normalPowerBaseW: 10
    lowPowerBaseW: 5
    perkByteTXWh: 0.00001
    perkByteDiskWR: 0.00002
    perkByteDiskRD: 0.00001
---
apiVersion: int.esa.yass/v1
kind: HardwareDefinition
metadata:
  name: oneweb
description: |
    Name: OneWeb Gen-1 (Ku-/Ka-band comms satellite)
    Mass: ~150 kg (vs ~1100 kg for Sentinel-2)
    Orbit: ~1200 km altitude, 87.9° inclination, 18 orbital planes × 36 sats
           in the full constellation (we use a sub-sample for UC sweeps).
    OBC class: ARM-grade SoC, much lighter than Sentinel-2's ERC-32.
    Payload: comms relay, not Earth observation — no large image buffers
             so on-board storage is modest.
    Battery / solar: ~5 kWh capacity, ~800 W average charge from panels.
spec:
  # Proportional to sentinel-2 (which is itself the diet'd 500m/512Mi
  # since 2026-05-29): OneWeb is ~7× lighter than Sentinel-2 so we halve
  # both CPU and RAM relative to sentinel-2. Storage cut more aggressively
  # — OneWeb is a relay, not an EO buffer.
  cpu: "250m"
  memory: "256Mi"
  diskSpace: "50Gi"
  batteryCapacityWh: 5000
  batteryChargeW: 800
  lowPowerThresholdWh: 500   # 10% of battery capacity
  energyConsumption:
    normalPowerBaseW: 500
    lowPowerBaseW: 300
    perkByteTXWh: 0.00001
    perkByteDiskWR: 0.00002
    perkByteDiskRD: 0.00001
---
apiVersion: int.esa.yass/v1
kind: HardwareDefinition
metadata:
  name: ground-station-hwdef
spec:
  # Sized 2026-05-29 to fit UC1-5 sweeps on cf — GS gets more headroom
  # than a satellite because it serves multiple SATs in parallel and is
  # the only side of every delivery (so it's the hot path).
  cpu: "2"
  memory: "4Gi"
  batteryCapacityWh: 1000
  batteryChargeW: 1000
  lowPowerThresholdWh: 0
  energyConsumption:
    normalPowerBaseW: 0
    lowPowerBaseW: 0
    perkByteTXWh: 0
    perkByteDiskWR: 0
    perkByteDiskRD: 0



