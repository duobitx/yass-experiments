apiVersion: int.esa.yass/v1
kind: Experiment
metadata:
  name: spain-shot-experiment
spec:
  simulationStartTime: "2026-05-16T23:59:00.000Z" # ~2 minutes to fly over Madrid
  experimentDefRef: spain-shot
  layoutDefRef: spain-shot-layout
  engineContainers:
    - name: engine-tus
      image: "ghcr.io/duobitx/yass-tus-fs-engine:latest"
      imagePullPolicy: Always
      env:
        - name: GROUND_STATIONS
          value: "*"
  start: true
