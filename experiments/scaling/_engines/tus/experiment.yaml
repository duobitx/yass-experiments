apiVersion: int.esa.yass/v1
kind: Experiment
metadata:
  name: scaling-experiment
spec:
  experimentDefRef: scaling
  layoutDefRef: scaling-layout
  start: true
  engineContainers:
    - name: engine-tus
      image: "ghcr.io/duobitx/yass-tus-fs-engine"
      env:
        - name: GROUND_STATIONS
          value: "estrack-new-norcia,estrack-kiruna,estrack-redu,estrack-cebreros,estrack-santa-maria,estrack-kourou,estrack-malargue"
