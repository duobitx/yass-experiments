apiVersion: int.esa.yass/v1
kind: HardwareDefinition
metadata:
  name: sentinel-2
description: |
    Name: Sentinel-2 (MSI)
    Primary Data: Optical MSI, 13 bands @10/20/60 m; 5-day global @equator (A/B/C/D planned)	
    Data Generation (≈/day): up to 1.6 TB stored per orbit (max); constellation daily volume multi-TB
    On-board Storage: ≈2.4 Tbit (300 GB) NAND flash mass memory
    OBC / Memory: Atmel ERC-32 OBC; dual MIL-STD-1553B buses
    Downlink / Relay: X-band 560 Mbit/s; EDRS optical relay; S-band TT&C 64 kbps up / 2 Mbit/s down	
    Connectivity Window: Laser (EDRS) + X-band passes (~10 min)	
    Launch Year: 2015	
    CPU class: ERC32 (SPARC V7) OBC ~20 MHz; payload DHU separate
spec:
  cpu: "120m"  # ERC-32
  memory: "20Mi"  # TSC693E
  diskSpace: "150Gi"  # 50% of NAND
  networkInterfaces:
    - name: xband0
      type: xband
      description: "X-band downlink: ~ 560 Mbit/s downlink (averaged over the transfer window)"
      tx: 70000000  # bit/s
      rx: 0  # bit/s
      minLatency: 0.015  # s
    - name: sband0
      type: sband
      description: "S-band TT&C: ~ 2 Mbit/s downlink, ~ 64 kbit/s uplink"
      tx: 2000000  # bit/s
      rx: 64000  # bit/s
      minLatency: 0.025  # s
    - name: edrs0
      type: edrs
      description: "EDRS optical relay: up to 1.8 Gbit/s (averaged over transfer window)"
      tx: 1800000000  # bit/s
      rx: 0  # bit/s
      minLatency: 0.026  # s
---
