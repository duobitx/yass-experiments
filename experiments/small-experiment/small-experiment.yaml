# Laptop-sized TUS experiment: 13 satellites (evenly-distributed Walker
# constellation) + 7 ESTRACK ground stations. Self-contained - apply with:
#   kubectl apply -f small-experiment.yaml
#
# Satellites form a Walker pattern: RAAN and mean anomaly are each stepped by
# 360/13 deg so orbital planes and in-plane phases are uniformly spread. Common
# inclination 60 deg on a near-circular ~1200 km shell. Each satellite produces
# a 1 MB file every ~8-20 s (high rate, to generate visible traffic) and carries
# a recurring non-Destroy hardware-fault stream.
#
# Ground stations are the 7 ESA ESTRACK core stations, receive-only. To fit the
# single-node 8-core/22Gi kind cluster they use the lean ground-station-small
# profile (250m/1Gi) defined below instead of ground-station-hwdef (1500m/4Gi):
# 13x200m sat + 7x250m GS + infra ~= 6.3 of 8 CPU. The CPU headroom matters at
# cold start, when all pods initialise at once and the kubelet/runtime overhead
# (not counted in pod requests) would otherwise tip the node into saturation.
apiVersion: v1
kind: Namespace
metadata:
  name: small-experiment-tus
  labels:
    yass-namespace: "true"
---
apiVersion: int.esa.yass/v1
kind: HardwareDefinition
metadata:
  name: ground-station-small
spec:
  cpu: 250m
  memory: 1Gi
  batteryCapacityWh: 1000
  batteryChargeW: 1000
  lowPowerThresholdWh: 0
  energyConsumption:
    lowPowerBaseW: 0
    normalPowerBaseW: 0
    perkByteDiskRD: 0
    perkByteDiskWR: 0
    perkByteTXWh: 0
---
