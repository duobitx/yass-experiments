apiVersion: v1
kind: ConfigMap
metadata:
  name: my-config
data:
  app.properties: |
    APP_MODE=production
    APP_TIMEOUT=30


---
apiVersion: int.esa.yass/v1
kind: FsNode
metadata:
  name: dev1-fs-node
  namespace: default
  labels:
    yass-experiment: dev-experiment
spec:
  orbit:
    tle:
      - "1,1957-001B,2,PAY,D,CIS,1957-10-04,TYMSC,1958-01-03,96.10,65.00,1080,64,,,EA,IMP"
      - "2,1957-002A,3,PAY,D,CIS,1957-11-03,TYMSC,1958-04-14,103.74,65.33,1659,211,0.0800,,EA,IMP"
  rotation:
    yaw: 0.0
    roll: 0.0
    pitch: 0.013
  agent:
    image: szalik/troubleshooting-image
    envsMap: # map[string]string
      beEffective: "yes"
  engineContainers:
    - name: engine
      image: "ghcr.io/duobitx/yass/fs_engine_udp_ping"
      env:
        - name: param1
          value: "zzz"
        - name: param2
          value: "xydw"
      volumeMounts:
        - name: config-volume
          mountPath: /etc/config
  engineVolumes:
    - name: config-volume
      configMap:
        name: my-config

  hardwareSpecRef: example-hwdef
