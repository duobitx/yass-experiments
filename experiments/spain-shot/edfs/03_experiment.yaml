apiVersion: int.esa.yass/v1
kind: Experiment
metadata:
  name: spain-shot-experiment
spec:
  simulationStartTime: "2026-05-16T23:59:00.000Z" # ~2 minutes to fly over Madrid
  experimentDefRef: spain-shot
  layoutDefRef: spain-shot-layout
  start: true
  engineContainers:
    - name: edfs-engine
      image: "ghcr.io/duobitx/yass-edfs-engine"
      env:
        - name: WATCH_DIR
          value: "/mnt/transfer"
        - name: EDFS_CLUSTER_SECRET
          value: 50896c846aed59faeec45d1779e6b9ca6fac89d135d988b52c2f366f1b7f373d
        - name: EDFS_CLUSTER_HOST
          value: "/ip4/127.0.0.1/tcp/9094"
        - name: EDFS_CONNECTION_RETRIES
          value: "3"
        - name: EDFS_REPLICATION_FACTOR
          value: "0.1"
    - name: edfs-engine-node
      image: "ghcr.io/duobitx/yass-edfs-engine-node"
      readinessProbe:
        exec:
          command: ["sh", "-c", "nc -z 127.0.0.1 5001"]
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 2
      env:
        - name: EDFS_SWARM_KEY
          value: e0e6161ec71e8e8c6d18c64dd8ee37f178fc50cadf58f20d08c481131a09bbae
        - name: EDFS_BOOTSTRAP_PEER_NAME
          value: estrack-new-norcia
        - name: EDFS_BOOTSTRAP_PEER_HOSTNAME
          value: estrack-new-norcia
        - name: EDFS_BOOTSTRAP_PEER_ID
          value: 12D3KooWLJFr7nesNtEQrQ9PqyjT8kvxbdUqfF4xwZZKEzJHnEhT
        - name: EDFS_BOOTSTRAP_PEER_KEY
          value: CAESQNU9ILPST19ucrp2ZzY4BN1+LnoLK5XnH86F8m2Ce3R7m7n8DOzBtVlE/3GS9UCxChfcU+Y/lkjR/T5nBJEujGY=
    - name: edfs-engine-proxy
      image: "ghcr.io/duobitx/yass-edfs-engine-proxy"
      readinessProbe:
        exec:
          command: ["sh", "-c", "nc -z 127.0.0.1 9094"]
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 2
      env:
        - name: EDFS_CLUSTER_SECRET
          value: 50896c846aed59faeec45d1779e6b9ca6fac89d135d988b52c2f366f1b7f373d
        - name: EDFS_BOOTSTRAP_PEER_NAME
          value: estrack-new-norcia
        - name: EDFS_BOOTSTRAP_PEER_HOSTNAME
          value: estrack-new-norcia
        - name: EDFS_BOOTSTRAP_PEER_ID
          value: 12D3KooWLJFr7nesNtEQrQ9PqyjT8kvxbdUqfF4xwZZKEzJHnEhT
        - name: EDFS_BOOTSTRAP_PEER_KEY
          value: CAESQNU9ILPST19ucrp2ZzY4BN1+LnoLK5XnH86F8m2Ce3R7m7n8DOzBtVlE/3GS9UCxChfcU+Y/lkjR/T5nBJEujGY=
