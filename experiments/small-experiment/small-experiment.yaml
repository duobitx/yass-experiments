spec:
  maxDuration: "999999h"
  behaviours:
    - fsNode: sat-01
      agent:
        image: ghcr.io/duobitx/yass-agent-periodic
        envsMap:
          FILE_SIZE: "1M"
          CHECK_INTERVAL_SECONDS: "8"
          MAX_PHOTOS: "0"
      hardwareEvents:
        - name: random-networkbandwidthreduced
          type: NetworkBandwidthReduced
          startOffset: 1m
          schedule:
            intervalMean: 5m
            intervalJitterPercent: 50
            durationMean: 30s
            durationJitterPercent: 50
            seed: 2000
          params:
            networkBandwidth:
              reductionPercent: 75
    - fsNode: sat-02
