apiVersion: int.esa.yass/v1
kind: ExperimentDefinition
metadata:
  name: spain-shot-hwfaults
spec:
  maxDuration: 10m
  behaviours:
    - fsNode: oneweb-0008
      agent:
        image: ghcr.io/duobitx/yass-agent-periodic
        envsMap:
          PHOTO_TARGETS: "spain:40.4:-3.7:500"
          FILE_SIZE: "32M"
          MAX_PHOTOS: "1"
          CHECK_INTERVAL_SECONDS: "5"
      hardwareEvents:
        - name: bw-cap-early
          type: NetworkBandwidthReduced
          startOffset: 30s
          duration: 30s
          params:
            networkBandwidth:
              capBitsPerSec: 50000
        - name: blackout
          type: NetworkFailure
          startOffset: 90s
          duration: 30s
        - name: disk-out
          type: DiskFull
          startOffset: 180s
          duration: 60s
        - name: disk-dead
          type: DiskFailure
          startOffset: 270s
          duration: 30s
        - name: end-of-life
          type: Destroy
          startOffset: 360s
    - fsNode: estrack-new-norcia
      agent:
        image: ghcr.io/duobitx/yass-agent-receive-only
        envsMap:
          END_ON_ANY: "true"
    - fsNode: estrack-kiruna
      agent:
        image: ghcr.io/duobitx/yass-agent-receive-only
        envsMap:
          END_ON_ANY: "true"
    - fsNode: estrack-redu
      agent:
        image: ghcr.io/duobitx/yass-agent-receive-only
        envsMap:
          END_ON_ANY: "true"
    - fsNode: estrack-cebreros
      agent:
        image: ghcr.io/duobitx/yass-agent-receive-only
        envsMap:
          END_ON_ANY: "true"
    - fsNode: estrack-santa-maria
      agent:
        image: ghcr.io/duobitx/yass-agent-receive-only
        envsMap:
          END_ON_ANY: "true"
    - fsNode: estrack-kourou
      agent:
        image: ghcr.io/duobitx/yass-agent-receive-only
        envsMap:
          END_ON_ANY: "true"
    - fsNode: estrack-malargue
      agent:
        image: ghcr.io/duobitx/yass-agent-receive-only
        envsMap:
          END_ON_ANY: "true"
