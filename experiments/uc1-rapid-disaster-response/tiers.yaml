# UC1 tiered sweep matrix. Driven by ./run.sh --tier <N>.
#
# Tier 1: headline curve — time-to-first-delivery vs sat_count, EDFS vs TUS.
#   Other parameters pinned at S=128M, priority=default, RF=3 (EDFS).
# Tier 2: parameter sensitivity at the n08 mid-point.
# Tier 3: deep dive at n100 — optional, only after Tier 1+2 if needed.
#
# Producer satellite is always the FIRST plane-diverse satellite in the
# Layout (oneweb-0027). All other sats are pure relays; the seven ESTRACK
# GSs are receivers with END_ON_ANY=true. sat_count 100/200 layouts add
# synthetic OneWeb-like relays on top of the 60 real roster sats.

tier_1:
  - { engine: edfs, sat_count: 1,   file_size: 128M, priority: default, rf: 3 }
  - { engine: edfs, sat_count: 2,   file_size: 128M, priority: default, rf: 3 }
  - { engine: edfs, sat_count: 8,   file_size: 128M, priority: default, rf: 3 }
  - { engine: edfs, sat_count: 21,  file_size: 128M, priority: default, rf: 3 }
  - { engine: edfs, sat_count: 100, file_size: 128M, priority: default, rf: 3 }
  - { engine: edfs, sat_count: 200, file_size: 128M, priority: default, rf: 3 }
  - { engine: tus,  sat_count: 1,   file_size: 128M }
  - { engine: tus,  sat_count: 2,   file_size: 128M }
  - { engine: tus,  sat_count: 8,   file_size: 128M }
  - { engine: tus,  sat_count: 21,  file_size: 128M }
  - { engine: tus,  sat_count: 100, file_size: 128M }
  - { engine: tus,  sat_count: 200, file_size: 128M }

tier_2:
  # File-size sensitivity at n08 (vs the 128M baseline in tier_1)
  - { engine: edfs, sat_count: 8, file_size: 256M, priority: default, rf: 3 }
  - { engine: tus,  sat_count: 8, file_size: 256M }
  # Priority sensitivity at n08 (EDFS only — TUS ignores priority)
  - { engine: edfs, sat_count: 8, file_size: 128M, priority: low,     rf: 3 }
  - { engine: edfs, sat_count: 8, file_size: 128M, priority: high,    rf: 3 }
  # RF sensitivity at n08
  - { engine: edfs, sat_count: 8, file_size: 128M, priority: default, rf: 1 }
  - { engine: edfs, sat_count: 8, file_size: 128M, priority: default, rf: 5 }

tier_3:
  # Optional repeat of Tier 2 at n100 — only run after Tier 1+2 are
  # analysed and we see a parameter effect worth tracking with scale.
  - { engine: edfs, sat_count: 100, file_size: 256M, priority: default, rf: 3 }
  - { engine: edfs, sat_count: 100, file_size: 128M, priority: low,     rf: 3 }
  - { engine: edfs, sat_count: 100, file_size: 128M, priority: high,    rf: 3 }
  - { engine: edfs, sat_count: 100, file_size: 128M, priority: default, rf: 1 }
  - { engine: edfs, sat_count: 100, file_size: 128M, priority: default, rf: 5 }
